version: "3.8"

services:
  viking-fitatu:
    build: .
    container_name: viking-fitatu
    restart: unless-stopped
    environment:
      - VIKING_EMAIL=${VIKING_EMAIL}
      - VIKING_PASSWORD=${VIKING_PASSWORD}
      - FITATU_EMAIL=${FITATU_EMAIL}
      - FITATU_PASSWORD=${FITATU_PASSWORD}
      - FITATU_SECRET=${FITATU_SECRET}
      - TZ=Europe/Warsaw
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.viking.schedule: "0 7 * * *"
      ofelia.job-exec.viking.command: "python /app/viking_fitatu_integration.py"

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ofelia
    restart: unless-stopped
    command: daemon --docker
    environment:
      - TZ=Europe/Warsaw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
